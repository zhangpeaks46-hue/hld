<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 好论点智检</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                primary: '#3B82F6', secondary: '#10B981',
                darkblue: '#1E40AF', lightblue: '#93C5FD'
            } } }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-green-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 fade-in">
        <!-- Logo -->
        <div class="text-center mb-6">
            <a href="../index.html" class="inline-flex items-center space-x-2">
                <img src="../images/logo.svg" alt="Logo" class="h-12 w-12">
                <span class="text-2xl font-bold text-gray-800">好论点智检</span>
            </a>
            <p class="text-gray-500 text-sm mt-2">手机验证码登录</p>
        </div>

        <!-- 登录表单 -->
        <form id="login-form" class="space-y-5">
            <!-- 手机号 -->
            <div>
                <label class="block text-gray-700 mb-2 text-sm font-medium">
                    <i class="fa fa-mobile text-primary mr-1"></i>手机号
                </label>
                <input type="tel" id="phone" class="form-input" placeholder="请输入 11 位手机号" maxlength="11" autocomplete="tel">
                <p id="phone-error" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <!-- 验证码 -->
            <div>
                <label class="block text-gray-700 mb-2 text-sm font-medium">
                    <i class="fa fa-shield text-primary mr-1"></i>验证码
                </label>
                <div class="flex gap-2">
                    <input type="text" id="code" class="form-input flex-1" placeholder="请输入 6 位验证码" maxlength="6" autocomplete="one-time-code" inputmode="numeric">
                    <button type="button" id="send-code-btn" class="btn-outline whitespace-nowrap" style="min-width:120px">
                        获取验证码
                    </button>
                </div>
                <p id="code-error" class="text-red-500 text-xs mt-1 hidden"></p>
                <!-- 模拟模式提示 -->
                <div id="mock-tip" class="hidden mt-2 p-2 bg-yellow-50 border border-yellow-200 rounded text-xs text-yellow-800">
                    <i class="fa fa-info-circle mr-1"></i>
                    <span id="mock-tip-text"></span>
                </div>
            </div>

            <!-- 协议 -->
            <div class="flex items-start">
                <input type="checkbox" id="agree" class="mt-1 mr-2">
                <label for="agree" class="text-gray-600 text-xs leading-relaxed">
                    我已阅读并同意
                    <a href="#" class="text-primary hover:underline">《服务条款》</a>
                    和
                    <a href="#" class="text-primary hover:underline">《隐私政策》</a>
                </label>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" id="login-submit" class="w-full btn-primary text-lg">
                <i class="fa fa-sign-in mr-2"></i>登录 / 注册
            </button>

            <p class="text-center text-xs text-gray-500">
                未注册手机号将自动创建账号
            </p>
        </form>

        <!-- 返回首页 -->
        <div class="mt-6 text-center">
            <a href="../index.html" class="text-gray-500 hover:text-primary text-sm">
                <i class="fa fa-arrow-left mr-1"></i>返回首页
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
        <div class="bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg fade-in flex items-center">
            <i class="fa fa-info-circle mr-2"></i>
            <span id="toast-message">操作成功</span>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
    (function () {
        'use strict';

        // 如果已登录，直接跳转
        API.Auth.check().then(function (res) {
            if (res.logged_in) {
                var redirect = getQuery('redirect');
                location.href = redirect || '../index.html';
            }
        }).catch(function () {});

        var phoneInput = document.getElementById('phone');
        var codeInput = document.getElementById('code');
        var sendBtn = document.getElementById('send-code-btn');
        var submitBtn = document.getElementById('login-submit');
        var agree = document.getElementById('agree');
        var phoneError = document.getElementById('phone-error');
        var codeError = document.getElementById('code-error');
        var mockTip = document.getElementById('mock-tip');
        var mockTipText = document.getElementById('mock-tip-text');

        // 仅允许数字
        phoneInput.addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 11);
            phoneError.classList.add('hidden');
        });
        codeInput.addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            codeError.classList.add('hidden');
        });

        // 发送验证码
        var countdown = 0;
        var cdTimer = null;

        sendBtn.addEventListener('click', function () {
            var phone = phoneInput.value.trim();
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showFieldError(phoneError, '请输入正确的手机号');
                return;
            }
            sendBtn.disabled = true;
            sendBtn.textContent = '发送中...';

            API.Auth.sendCode(phone).then(function (res) {
                if (res.success) {
                    API.showToast('验证码已发送', 'success');
                    // 模拟模式直接展示验证码
                    if (res.mock && res.dev_code) {
                        mockTip.classList.remove('hidden');
                        mockTipText.textContent = '当前为模拟模式，您的验证码是：' + res.dev_code + '（接入真实短信后此提示消失）';
                    }
                    startCountdown(60);
                } else {
                    API.showToast(res.message || '发送失败', 'error');
                    sendBtn.disabled = false;
                    sendBtn.textContent = '获取验证码';
                }
            }).catch(function () {
                API.showToast('网络错误，请重试', 'error');
                sendBtn.disabled = false;
                sendBtn.textContent = '获取验证码';
            });
        });

        function startCountdown(sec) {
            countdown = sec;
            sendBtn.disabled = true;
            sendBtn.textContent = sec + 's 后重发';
            cdTimer = setInterval(function () {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(cdTimer);
                    sendBtn.disabled = false;
                    sendBtn.textContent = '获取验证码';
                } else {
                    sendBtn.textContent = countdown + 's 后重发';
                }
            }, 1000);
        }

        // 提交登录
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var phone = phoneInput.value.trim();
            var code = codeInput.value.trim();

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showFieldError(phoneError, '请输入正确的手机号');
                return;
            }
            if (code.length !== 6) {
                showFieldError(codeError, '请输入 6 位验证码');
                return;
            }
            if (!agree.checked) {
                API.showToast('请阅读并同意服务条款和隐私政策', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>登录中...';

            API.Auth.verifyLogin(phone, code).then(function (res) {
                if (res.success) {
                    API.showToast('登录成功，欢迎回来！', 'success');
                    setTimeout(function () {
                        var redirect = getQuery('redirect');
                        location.href = redirect || '../index.html';
                    }, 600);
                } else {
                    API.showToast(res.message || '登录失败', 'error');
                    showFieldError(codeError, res.message || '验证码错误');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa fa-sign-in mr-2"></i>登录 / 注册';
                }
            }).catch(function () {
                API.showToast('网络错误，请重试', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa fa-sign-in mr-2"></i>登录 / 注册';
            });
        });

        function showFieldError(el, msg) {
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function getQuery(name) {
            var m = new RegExp('[?&]' + name + '=([^&]+)').exec(location.search);
            return m ? decodeURIComponent(m[1]) : null;
        }
    })();
    </script>
</body>
</html>
